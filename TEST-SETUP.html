<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup Test - Dream Farm Trust</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #10B981, #3B82F6);
    }
    .test-box {
      background: white;
      padding: 60px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
      max-width: 500px;
    }
    h1 {
      color: #10B981;
      font-size: 48px;
      margin-bottom: 20px;
    }
    p {
      font-size: 20px;
      color: #4B5563;
      line-height: 1.6;
    }
    .success {
      font-size: 80px;
      margin-bottom: 20px;
    }
    .button {
      display: inline-block;
      margin-top: 30px;
      padding: 15px 30px;
      background: linear-gradient(135deg, #10B981, #059669);
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      font-size: 18px;
    }
    .button:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
    }
  </style>
</head>
<body>
  <div class="test-box">
    <div class="success">✅</div>
    <h1>IT WORKS!</h1>
    <p>If you can see this page properly (not code), your browser setup is correct!</p>
    <p><strong>Next steps:</strong></p>
    <p>1. Open <code>START-HERE.html</code> in your browser</p>
    <p>2. Follow the instructions there</p>
    <p>3. Login to admin dashboard</p>
    <a href="START-HERE.html" class="button">📚 Open Start Guide</a>
    <a href="admin-login.html" class="button">🔐 Go to Admin Login</a>
  </div>

  <script>
    console.log('✅ Test page loaded successfully!');
    console.log('Your browser can run HTML and JavaScript correctly.');
    alert('SUCCESS! ✅\n\nYour setup works perfectly!\n\nClick OK, then open START-HERE.html to continue.');
  </script>
</body>
</html>
